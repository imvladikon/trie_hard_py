name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Python tooling
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip "maturin>=1.13,<2" pytest

      - name: Rust tests
        run: cargo test

      - name: Rust formatting
        run: cargo fmt --check

      - name: Rust lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build extension in editable mode
        run: VIRTUAL_ENV="$PWD/.venv" .venv/bin/python -m maturin develop --release

      - name: Python tests
        run: .venv/bin/python -m pytest -q

  build-linux-wheels:
    name: Build Linux wheels (py${{ matrix.python-version }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            interpreter: /opt/python/cp39-cp39/bin/python
          - python-version: "3.10"
            interpreter: /opt/python/cp310-cp310/bin/python
          - python-version: "3.11"
            interpreter: /opt/python/cp311-cp311/bin/python
          - python-version: "3.12"
            interpreter: /opt/python/cp312-cp312/bin/python
          - python-version: "3.13"
            interpreter: /opt/python/cp313-cp313/bin/python
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter ${{ matrix.interpreter }}
          manylinux: auto
          sccache: true

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-ubuntu-latest-${{ matrix.python-version }}
          path: dist

  build-native-wheels:
    name: Build wheels (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter python
          sccache: true

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist

  build-sdist:
    name: Build sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist

  publish:
    name: Publish release
    needs: [build-linux-wheels, build-native-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - name: Check artifacts
        run: |
          python -m pip install -U pip twine pkginfo packaging
          python -m twine check dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          overwrite_files: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
