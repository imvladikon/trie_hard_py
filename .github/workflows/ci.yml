name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Python tooling
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip "maturin>=1.13,<2" pytest
      - name: Rust tests
        run: cargo test
      - name: Rust formatting
        run: cargo fmt --check
      - name: Rust lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build extension in editable mode
        run: VIRTUAL_ENV="$PWD/.venv" .venv/bin/python -m maturin develop --release
      - name: Python tests
        run: .venv/bin/python -m pytest -q

  wheels:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter python
          sccache: true
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*
